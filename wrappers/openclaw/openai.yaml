interface:
  display_name: "Local RAG KB"
  short_description: "Build and query a local file-backed RAG knowledge base."
  default_prompt: "Use $local-rag-kb to bootstrap its local .venv if available, fall back to system python3 when venv or ensurepip is unavailable, ingest readable local file paths with --host openclaw, emit a host answer bundle, and answer with references."

policy:
  allow_implicit_invocation: true
